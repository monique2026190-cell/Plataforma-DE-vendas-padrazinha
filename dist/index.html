<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />

  <!-- Responsividade + prevenção de zoom bugado em mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- Evita problemas de compatibilidade com navegadores antigos -->
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <!--
    Content Security Policy (CSP) para aumentar a segurança contra ataques XSS.
    - default-src 'self': Permite conteúdo apenas da mesma origem por padrão.
    - script-src 'self' https://accounts.google.com: Permite scripts do nosso domínio e da API do Google para autenticação.
    - style-src 'self' 'unsafe-inline' https://fonts.googleapis.com: Permite estilos do nosso domínio, inline (necessário por algumas libs de UI) e do Google Fonts.
    - font-src 'self' https://fonts.gstatic.com: Permite fontes do nosso domínio e do Google Fonts.
    - img-src 'self' data: https: Permite imagens do nosso domínio, data URIs e qualquer fonte HTTPS.
    - connect-src 'self' https://accounts.google.com https://*.googleapis.com: Permite conexões de API para nosso domínio e para os serviços do Google.
  -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://accounts.google.com https://*.googleapis.com;" />

  <!-- Cor da barra de endereço em navegadores mobile -->
  <meta name="theme-color" content="#121212" />

  <!-- Prevenção de cache para evitar que o usuário veja uma versão antiga da aplicação -->
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, proxy-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <!-- Otimização de carregamento: inicia a conexão com o servidor de fontes mais cedo -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <title>App</title>
  <script type="module" crossorigin src="/assets/index-CUqbO5ax.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/vendor-BiQe1lct.js">
  <link rel="modulepreload" crossorigin href="/assets/framework-BXbx95pH.js">
</head>

<body>
  <!-- Mensagem exibida caso o JavaScript esteja desabilitado -->
  <noscript>
    ⚠️ Para uma experiência completa, por favor, habilite o JavaScript no seu navegador.
  </noscript>

  <!-- Fallback de carregamento: evita a "tela branca" enquanto o React está sendo inicializado -->
  <div id="root">
    <div style="
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      background-color:#121212;
      color:white;
      text-align:center;
    ">
      Carregando aplicação...
    </div>
  </div>

  <!-- Ponto de entrada da aplicação React -->
</body>
</html>
